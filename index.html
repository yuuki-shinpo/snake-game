<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      user-select: none;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.15em;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8066;
      margin-bottom: 12px;
    }

    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #888;
      text-transform: uppercase;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #4ade80;
    }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #4ade8044;
      border-radius: 8px;
      box-shadow: 0 0 40px #4ade8022;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.85);
      border-radius: 6px;
      gap: 12px;
    }

    #overlay h2 {
      font-size: 2rem;
      color: #4ade80;
    }

    #overlay p {
      color: #aaa;
      font-size: 0.95rem;
    }

    #overlay .final-score {
      font-size: 1.2rem;
      color: #fbbf24;
    }

    button {
      margin-top: 8px;
      padding: 10px 32px;
      font-size: 1rem;
      background: #4ade80;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.05em;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 16px #4ade8088;
    }

    #hint {
      margin-top: 14px;
      font-size: 0.78rem;
      color: #555;
    }
  </style>
</head>
<body>

<h1>🐍 SNAKE</h1>

<div id="scoreboard">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value" id="best">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Level</div>
    <div class="score-value" id="level">1</div>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">矢印キー または WASD で操作</p>
    <p class="final-score" id="overlay-score" style="display:none"></p>
    <button id="btn">スタート</button>
  </div>
</div>

<p id="hint">スペースキーで一時停止 / 再開</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const COLS = 24, ROWS = 24;
const CELL = canvas.width / COLS;

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg   = document.getElementById('overlay-msg');
const overlayScore = document.getElementById('overlay-score');
const btn = document.getElementById('btn');

let snake, dir, nextDir, food, score, best, level, speed, loop, paused, running;

best = parseInt(localStorage.getItem('snakeBest') || '0');
bestEl.textContent = best;

function init() {
  snake = [
    {x: 12, y: 12},
    {x: 11, y: 12},
    {x: 10, y: 12},
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  level = 1;
  speed = 140;
  paused = false;
  running = true;
  scoreEl.textContent = 0;
  levelEl.textContent = 1;
  placeFood();
  overlay.style.display = 'none';
  clearInterval(loop);
  loop = setInterval(tick, speed);
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function tick() {
  if (paused || !running) return;

  dir = nextDir;
  const head = { x: (snake[0].x + dir.x + COLS) % COLS, y: (snake[0].y + dir.y + ROWS) % ROWS };

  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += level * 10;
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('snakeBest', best);
    }
    // Level up every 5 foods
    const foodCount = (score / (level * 10));
    if (foodCount % 5 === 0) {
      level = Math.min(level + 1, 10);
      levelEl.textContent = level;
      speed = Math.max(60, 140 - (level - 1) * 10);
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Background
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid (subtle)
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Food (glowing circle)
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const gradient = ctx.createRadialGradient(fx, fy, 0, fx, fy, CELL * 0.7);
  gradient.addColorStop(0, '#fbbf24');
  gradient.addColorStop(1, '#f97316aa');
  ctx.beginPath();
  ctx.arc(fx, fy, CELL * 0.38, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();

  // Snake
  snake.forEach((seg, i) => {
    const x = seg.x * CELL, y = seg.y * CELL;
    const progress = i / snake.length;
    const green = Math.round(222 - progress * 60);
    ctx.fillStyle = i === 0 ? '#4ade80' : `rgb(30, ${green}, 80)`;
    const pad = i === 0 ? 1 : 2;
    const radius = i === 0 ? 5 : 3;
    roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, radius);
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#1a1a2e';
      const [ex1, ey1, ex2, ey2] = eyePositions(seg, dir);
      ctx.beginPath(); ctx.arc(ex1, ey1, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI * 2); ctx.fill();
    }
  });
}

function eyePositions(seg, d) {
  const cx = seg.x * CELL + CELL / 2;
  const cy = seg.y * CELL + CELL / 2;
  const offset = CELL * 0.22;
  if (d.x === 1)  return [cx + offset, cy - offset, cx + offset, cy + offset];
  if (d.x === -1) return [cx - offset, cy - offset, cx - offset, cy + offset];
  if (d.y === 1)  return [cx - offset, cy + offset, cx + offset, cy + offset];
  return [cx - offset, cy - offset, cx + offset, cy - offset];
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function gameOver() {
  clearInterval(loop);
  running = false;
  if (score > best) {
    best = score;
    bestEl.textContent = best;
    localStorage.setItem('snakeBest', best);
  }
  overlayTitle.textContent = 'GAME OVER';
  overlayMsg.textContent = '矢印キー または WASD で操作';
  overlayScore.textContent = `スコア: ${score}`;
  overlayScore.style.display = 'block';
  btn.textContent = 'もう一度';
  overlay.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1},
    ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
    w: {x:0,y:-1}, s: {x:0,y:1}, a: {x:-1,y:0}, d: {x:1,y:0},
    W: {x:0,y:-1}, S: {x:0,y:1}, A: {x:-1,y:0}, D: {x:1,y:0},
  };
  if (map[e.key]) {
    e.preventDefault();
    const nd = map[e.key];
    // Prevent reversing
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
  }
  if (e.key === ' ' && running) {
    e.preventDefault();
    paused = !paused;
  }
});

btn.addEventListener('click', init);

// Initial draw
ctx.fillStyle = '#0f0f1a';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
